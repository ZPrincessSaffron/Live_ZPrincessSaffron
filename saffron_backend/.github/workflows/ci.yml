name: Saffron Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: saffron_backend/package-json

      - name: Install Backend Dependencies
        run: |
          cd saffron_backend
          npm ci

      - name: Run Jest Tests (Unit + Integration + DB)
        run: |
          cd saffron_backend
          npm test

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests (Newman)
        run: |
          cd saffron_backend
          # Newman requires a running server for real API tests, 
          # but here we focus on the collection structure or use a background server
          # npm start & 
          # sleep 5
          # npm run test:api
          echo "API Tests would run here with a live server"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: saffron_frontend
          start: npm run dev
          wait-on: 'http://localhost:5173'
